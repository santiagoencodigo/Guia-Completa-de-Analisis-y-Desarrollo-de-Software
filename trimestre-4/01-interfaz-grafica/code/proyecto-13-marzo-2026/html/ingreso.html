<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Ingreso | santiagoencodigo Computadores</title>
    <link rel="stylesheet" type="text/css" href="../css/estilos.formulario.css">
    <link rel="shortcut icon" href="../css/img/person-icon.svg">
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-form">
                <img src="../css/img/person-icon.svg" alt="Logo santiagoencodigo" title="santiagoencodigo | Computadores">
                <h2>Bienvenido</h2>
                <p>Ingresa a tu cuenta</p>
            </div>

            <form action="../si/index-admin.html" method="post">
                <div class="input-group">
                    <input type="text" class="text" placeholder="Usuario o correo electrónico" name="username" required>
                </div>

                <div class="input-group">
                    <input type="password" class="text" placeholder="Contraseña" name="password" required>
                </div>

                <div class="options">
                    <label class="remember">
                        <input type="checkbox" name="remember"> Recordarme
                    </label>
                    <a href="olvido-contrasena.html" class="forgot">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>

                <div class="register-link">
                    <p>¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </div>
            </form>

            <div class="back-home">
                <a href="../index.html" class="btn-back">← Volver al inicio</a>
            </div>
        </div>
    </div>
</body>
</html>
